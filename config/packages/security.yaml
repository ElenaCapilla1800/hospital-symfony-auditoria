# config/packages/security.yaml
security:
    # 1. ENCRIPTACIÓN: Algoritmo automático para las contraseñas
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # 2. PROVEEDOR: Dónde buscamos a los usuarios (Base de datos vía Email)
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    # 3. JERARQUÍA: Definimos qué roles tienen más poder que otros
    role_hierarchy:
        ROLE_DOCTOR:       ROLE_USER
        ROLE_RECEPCIONIST: ROLE_USER
        ROLE_ADMIN:        [ROLE_DOCTOR, ROLE_RECEPCIONIST]

    # 4. FIREWALLS: El orden aquí es VITAL (de más específico a más general)
    firewalls:
        # A. Zona de Desarrollo: Sin seguridad para archivos internos (profiler, css...)
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # B. LOGIN DE LA API: El túnel para obtener el Token
        login_api:
            pattern: ^/api/login
            stateless: true
            json_login:
                check_path: /api/login_check
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        # C. RESTO DE LA API: Protegido por Token JWT
        api:
            pattern:   ^/api
            stateless: true
            jwt: ~ # Activa la verificación del token en cada petición

        # D. FIREWALL PRINCIPAL (WEB): Para el acceso por formulario
        main:
            lazy: true
            provider: app_user_provider
            custom_authenticator: App\Security\AppCustomAuthenticator
            user_checker: App\Security\UserChecker
            login_throttling:
                max_attempts: 5
                interval: '1 minute'
            logout:
                path: app_logout
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /

    # 5. CONTROL DE ACCESO: Reglas de tráfico
    access_control:
        # --- REGLAS DE LA API ---
        # 1. Permitimos el login para que nos den el token
        - { path: ^/api/login, roles: PUBLIC_ACCESS }

        # 2. MODIFICACIÓN VITAL: Permitimos ver la documentación sin token
        # Esto soluciona el error 401 en la web de Swagger
        - { path: ^/api/doc,   roles: PUBLIC_ACCESS }

        # 3. El resto de la API requiere estar autenticado al 100%
        - { path: ^/api,       roles: IS_AUTHENTICATED_FULLY }

        # --- REGLAS DE LA WEB ---
        - { path: ^/admin,     roles: ROLE_ADMIN }

# Configuración optimizada para tests
when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10